name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            autoconf
            automake
            libtool
            make
            patch
            pkgconf
            tar
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-fftw
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-portaudio
            mingw-w64-x86_64-qt5-activeqt
            mingw-w64-x86_64-qt5-base
            mingw-w64-x86_64-qt5-multimedia
            mingw-w64-x86_64-qt5-serialport
            mingw-w64-x86_64-qt5-tools
            mingw-w64-x86_64-qt5-websockets

      - name: Install NSIS
        shell: powershell
        run: |
          choco install nsis --no-progress -y
          "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Define MSYS2 paths
        run: |
          set -euo pipefail
          echo "BUILD_DIR=$PWD/build-windows-x64" >> "$GITHUB_ENV"
          echo "PACKAGE_DIR=$PWD/build-windows-x64/package" >> "$GITHUB_ENV"
          echo "DEPS_PREFIX=$PWD/local-x64" >> "$GITHUB_ENV"
          echo "WSJTX_SRC_DIR=$PWD/wsjtx-src-x64" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=$PWD/local-x64/lib/pkgconfig:/mingw64/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Build and install Hamlib
        run: |
          set -euo pipefail
          mkdir -p "$DEPS_PREFIX"
          tar xzf src/hamlib-4.7.tar.gz
          cd hamlib-4.7
          ./configure --prefix="$DEPS_PREFIX" --disable-shared --enable-static --without-cxx-binding --without-readline
          make -j"$(nproc)"
          make install-strip

      - name: Extract and patch WSJT-X sources
        run: |
          set -euo pipefail
          rm -rf "$WSJTX_SRC_DIR"
          mkdir -p "$WSJTX_SRC_DIR"
          tar xzf src/wsjtx.tgz -C "$WSJTX_SRC_DIR" --strip-components=1
          sed -i 's/\r$//' "$GITHUB_WORKSPACE/wsjtx.patch"
          sed -i 's/\r$//' "$GITHUB_WORKSPACE/cmake-changes.patch"
          sed -i 's/\r$//' "$GITHUB_WORKSPACE/itone.patch"
          sed -i 's/\r$//' "$GITHUB_WORKSPACE/simple-cat.patch"
          # sed -i 's/\r$//' "$GITHUB_WORKSPACE/cdc-acm-fixes-windows.patch"
          # sed -i 's/\r$//' "$GITHUB_WORKSPACE/more-cdc-acm-fixes-windows.patch"
          cd "$WSJTX_SRC_DIR"
          patch -p1 -N < "$GITHUB_WORKSPACE/wsjtx.patch"
          patch -p1 -N < "$GITHUB_WORKSPACE/itone.patch"
          patch -p1 -N < "$GITHUB_WORKSPACE/simple-cat.patch"
          patch -p1 -N < "$GITHUB_WORKSPACE/cmake-changes.patch"
          # patch -p1 -N < "$GITHUB_WORKSPACE/cdc-acm-fixes-windows.patch"
          # patch -p1 -N < "$GITHUB_WORKSPACE/more-cdc-acm-fixes-windows.patch"
          cp "$GITHUB_WORKSPACE/SimpleCATTransceiver.cpp" Transceiver/
          cp "$GITHUB_WORKSPACE/SimpleCATTransceiver.hpp" Transceiver/
          cp "$GITHUB_WORKSPACE/serialib.cpp" Transceiver/
          cp "$GITHUB_WORKSPACE/serialib.h" Transceiver/
          cp "$GITHUB_WORKSPACE/CMakeLists.txt" .
          sed -i 's/\r$//' CMakeLists.txt Transceiver/TransceiverFactory.cpp CMake/Modules/FindFFTW3.cmake CMake/Modules/FindHamlib.cmake
          perl -0pi -e 's/option \(WSJT_FOX_OTP "Enable Fox OTP Verification Messages\."\ ON\)\n/option (WSJT_FOX_OTP "Enable Fox OTP Verification Messages." ON)\noption (WSJT_DISABLE_OMNIRIG\n  "Disable OmniRig support. Useful for Windows CI environments without OmniRig installed."\n  OFF)\nif (WSJT_DISABLE_OMNIRIG)\n  add_definitions (-DWSJT_DISABLE_OMNIRIG)\nendif ()\n/s' CMakeLists.txt
          perl -0pi -e 's/if \(WIN32\)\n  set \(wsjt_CXXSRCS\n    \$\{wsjt_CXXSRCS\}\n    killbyname\.cpp\n    \)\n\n  set \(wsjt_qt_CXXSRCS\n    \$\{wsjt_qt_CXXSRCS\}\n    Transceiver\/OmniRigTransceiver\.cpp\n    \)\nendif \(WIN32\)/if (WIN32)\n  set (wsjt_CXXSRCS\n    \${wsjt_CXXSRCS}\n    killbyname.cpp\n    )\n\n  if (NOT WSJT_DISABLE_OMNIRIG)\n    set (wsjt_qt_CXXSRCS\n      \${wsjt_qt_CXXSRCS}\n      Transceiver\/OmniRigTransceiver.cpp\n      )\n  endif ()\nendif (WIN32)/s' CMakeLists.txt
          perl -0pi -e 's/if \(WIN32\)\n  # generate the OmniRig COM interface source/if (WIN32 AND NOT WSJT_DISABLE_OMNIRIG)\n  # generate the OmniRig COM interface source/s' CMakeLists.txt
          perl -0pi -e 's/if \(WIN32\)\n  include \(QtAxMacros\)/if (WIN32 AND NOT WSJT_DISABLE_OMNIRIG)\n  include (QtAxMacros)/s' CMakeLists.txt
          perl -0pi -e 's/#if defined \(WIN32\)\n#include "OmniRigTransceiver\.hpp"/#if defined (WIN32) \&\& !defined (WSJT_DISABLE_OMNIRIG)\n#include "OmniRigTransceiver.hpp"/s' Transceiver/TransceiverFactory.cpp
          perl -0pi -e 's/#if defined \(WIN32\)\n  \/\/ OmniRig is ActiveX\/COM server so only on Windows/#if defined (WIN32) \&\& !defined (WSJT_DISABLE_OMNIRIG)\n  \/\/ OmniRig is ActiveX\/COM server so only on Windows/s' Transceiver/TransceiverFactory.cpp
          perl -0pi -e 's/#if defined \(WIN32\)\n    case OmniRigOneId:/#if defined (WIN32) \&\& !defined (WSJT_DISABLE_OMNIRIG)\n    case OmniRigOneId:/s' Transceiver/TransceiverFactory.cpp
          perl -0pi -e 's/# If using threads, we need to link against threaded libraries as well - except on Windows\.\nif \(NOT WIN32 AND _use_threads\)/# If using threads, we need to link against threaded libraries as well.\nif (_use_threads)/s; s/endif \(NOT WIN32 AND _use_threads\)/endif (_use_threads)/s' CMake/Modules/FindFFTW3.cmake
          perl -0pi -e 's/set \(Hamlib_LIBRARIES \$\{Hamlib_LIBRARIES\};\$\{Usb_LIBRARY\};ws2_32\)/set (Hamlib_LIBRARIES \${Hamlib_LIBRARIES};\${Usb_LIBRARY};ws2_32;iphlpapi)/s' CMake/Modules/FindHamlib.cmake

      - name: Configure WSJT-X
        run: |
          set -euo pipefail
          cmake -S "$WSJTX_SRC_DIR" -B "$BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$DEPS_PREFIX;/mingw64" \
            -DCMAKE_INSTALL_PREFIX="$DEPS_PREFIX" \
            -DWSJT_DISABLE_OMNIRIG=ON \
            -DWSJT_GENERATE_DOCS=OFF \
            -DWSJT_SKIP_MANPAGES=ON

      - name: Build package
        run: |
          set -euo pipefail
          cmake --build "$BUILD_DIR" --parallel
          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR"
          cpack --config "$BUILD_DIR/CPackConfig.cmake" -G NSIS -B "$PACKAGE_DIR"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wsjtx-windows-installer-x64
          path: |
            build-windows-x64/package/*.exe
          if-no-files-found: error
